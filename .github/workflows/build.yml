name: Build & Release

on:
  push:
    branches: [release]
  workflow_dispatch:

permissions:
  contents: write  # tag + release creation

jobs:
  # -----------------------------------------------------------------
  # 1) Přečte verzi z pyproject.toml a ověří, že tag ještě neexistuje.
  #    Hodnoty se propagují do build matrixu i do release jobu.
  # -----------------------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      win_version: ${{ steps.version.outputs.win_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Read version from pyproject.toml
        id: version
        shell: pwsh
        run: |
          $content = Get-Content pyproject.toml -Raw
          if ($content -notmatch '(?m)^\s*version\s*=\s*"([^"]+)"') {
            throw "Could not parse version from pyproject.toml"
          }
          $ver = $Matches[1]
          $tag = "v$ver"
          # Nuitka --file-version vyžaduje 4-part: 0.1.0 -> 0.1.0.0
          $parts = ($ver -replace '[^0-9.]', '').TrimEnd('.').Split('.') | Where-Object { $_ -ne '' }
          while ($parts.Count -lt 4) { $parts = @($parts) + '0' }
          $winVer = ($parts[0..3]) -join '.'
          Write-Host "Version: $ver"
          Write-Host "Tag: $tag"
          Write-Host "Win version (Nuitka): $winVer"
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "win_version=$winVer" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Verify tag does not already exist
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $local = git tag -l $tag
          $remote = git ls-remote --tags origin "refs/tags/$tag"
          if ($local -or $remote) {
            throw "Tag '$tag' already exists. Bump 'version' in pyproject.toml before pushing to release."
          }
          Write-Host "Tag $tag is free."

  # -----------------------------------------------------------------
  # 2) Build matrix — Windows + Linux. PowerShell Core (`pwsh`) běží
  #    na obou runnerech, takže držíme jednu syntaxi přes celý job.
  # -----------------------------------------------------------------
  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
          - os: ubuntu-latest
            label: linux-x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install package + build deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install nuitka ordered-set zstandard

      - name: Cache Nuitka build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/Nuitka
            ~\AppData\Local\Nuitka\Nuitka\Cache
            ~\AppData\Local\Nuitka\nuitka\Cache
          key: nuitka-${{ matrix.label }}-py311-${{ hashFiles('pyproject.toml', 'launcher.py', 'bb_viewer/**/*.py', 'static/**/*') }}
          restore-keys: |
            nuitka-${{ matrix.label }}-py311-

      - name: Build standalone exe with Nuitka
        run: |
          python -m nuitka `
            --standalone `
            --assume-yes-for-downloads `
            --lto=no `
            --output-dir=dist `
            --output-filename=bb-viewer `
            --include-package=bb_viewer `
            --include-package=bs4 `
            --include-package=soupsieve `
            --include-data-dir=static=static `
            --include-data-files=config.example.toml=config.example.toml `
            --nofollow-import-to=IPython `
            --nofollow-import-to=lxml `
            --nofollow-import-to=tkinter `
            --nofollow-import-to=PIL `
            --nofollow-import-to=numpy `
            --company-name="bb-viewer" `
            --product-name="bb-viewer" `
            --file-version=${{ needs.prepare.outputs.win_version }} `
            --product-version=${{ needs.prepare.outputs.win_version }} `
            --file-description="Blackboard Backup Viewer" `
            --copyright="MIT License" `
            --remove-output `
            launcher.py

      - name: Smoke-test the built binary
        run: |
          $exe = if ($IsWindows) { ".\dist\launcher.dist\bb-viewer.exe" } else { "./dist/launcher.dist/bb-viewer" }
          $output = & $exe nonexistent-config-for-smoke-test.toml 2>&1 | Out-String
          $exit = $LASTEXITCODE
          Write-Host "Exit code: $exit"
          Write-Host "Output:`n$output"
          if ($exit -ne 1) {
            throw "Expected exit code 1, got $exit"
          }
          if ($output -notmatch "nebyl nalezen") {
            throw "Expected error message about missing config in output."
          }
          $global:LASTEXITCODE = 0
          exit 0

      - name: Stage dist folder
        id: stage
        run: |
          $folder = "bb-viewer-${{ matrix.label }}-${{ needs.prepare.outputs.tag }}"
          Rename-Item -Path dist/launcher.dist -NewName $folder
          "folder=$folder" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create archive
        id: archive
        run: |
          $folder = "${{ steps.stage.outputs.folder }}"
          if ($IsWindows) {
            $archive = "dist/$folder.zip"
            Compress-Archive -Path "dist/$folder" -DestinationPath $archive
          } else {
            # tar.gz na Linuxu zachovává executable bit a symlinky
            $archive = "dist/$folder.tar.gz"
            tar -czf $archive -C dist $folder
          }
          Get-Item $archive | Format-List FullName, Length
          "archive=$archive" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage.outputs.folder }}
          path: ${{ steps.archive.outputs.archive }}
          retention-days: 14
          if-no-files-found: error

  # -----------------------------------------------------------------
  # 3) Vytvoří GitHub Release a přidá oba archivy.
  #    Tag se vytvoří na release commitu.
  # -----------------------------------------------------------------
  release:
    needs: [prepare, build]
    if: github.ref == 'refs/heads/release'
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List archives
        run: ls -lh dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/*.zip
            dist/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
